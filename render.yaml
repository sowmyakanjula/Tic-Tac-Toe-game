databases:
  - name: lila-nakama-db
    plan: free
    databaseName: nakama
    user: nakama
    region: oregon
    postgresMajorVersion: "16"

services:
  - type: web
    name: lila-nakama
    runtime: docker
    repo: https://github.com/sowmyakanjula/Tic-Tac-Toe-game
    branch: main
    rootDir: nakama
    dockerContext: .
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lila-nakama-db
          property: connectionString
      - key: NAKAMA_SERVER_KEY
        generateValue: true
      - key: SESSION_ENCRYPTION_KEY
        generateValue: true
      - key: SESSION_REFRESH_ENCRYPTION_KEY
        generateValue: true
      - key: RUNTIME_HTTP_KEY
        generateValue: true
      - key: NAKAMA_ADMIN_USER
        value: admin
      - key: NAKAMA_ADMIN_PASSWORD
        generateValue: true

  - type: web
    name: lila-tictactoe-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_NAKAMA_HOST
        sync: false
      - key: VITE_NAKAMA_PORT
        value: "443"
      - key: VITE_NAKAMA_SERVER_KEY
        sync: false
      - key: VITE_NAKAMA_USE_SSL
        value: "true"
